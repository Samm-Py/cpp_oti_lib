name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

env:
  KOKKOS_VERSION: "5.1.1"

jobs:
  cpp:
    name: C++ tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            cc: gcc
            cxx: g++
          - name: Clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Clang
        if: matrix.name == 'Clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure
        run: cmake -S . -B build -DOTI_BUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build --parallel 2

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

      - name: Run direct test script
        run: tests/run_unit_tests.sh

      - name: Install CMake package
        run: cmake --install build --prefix "$RUNNER_TEMP/otinum-install"

      - name: Build installed-package consumer
        run: |
          cmake -S tests/cmake_consumer -B build-consumer \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/otinum-install"
          cmake --build build-consumer --parallel 2
          ctest --test-dir build-consumer --output-on-failure

  kokkos-cpu:
    name: Kokkos CPU/OpenMP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ git cmake

      - name: Build and install Kokkos OpenMP
        run: |
          git clone --branch "$KOKKOS_VERSION" --depth 1 \
            https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kokkos-build-openmp \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/kokkos-install-openmp \
            -DCMAKE_CXX_COMPILER=g++ \
            -DKokkos_ENABLE_OPENMP=ON \
            -DKokkos_ARCH_NATIVE=ON
          cmake --build /tmp/kokkos-build-openmp --target install --parallel 2

      - name: Configure cpp_oti_lib with Kokkos OpenMP
        # OTI_BUILD_TESTS=ON builds the full scalar suite against the
        # Kokkos::Array backing (not just the smoke test), so the
        # OTI_ENABLE_KOKKOS storage path is exercised by every test.
        run: |
          cmake -S . -B build-kokkos-openmp \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/tmp/kokkos-install-openmp \
            -DOTI_ENABLE_KOKKOS=ON \
            -DOTI_BUILD_PYTHON=OFF \
            -DOTI_BUILD_TESTS=ON

      - name: Build Kokkos OpenMP tests
        run: cmake --build build-kokkos-openmp --parallel 2

      - name: Run Kokkos OpenMP tests
        run: ctest --test-dir build-kokkos-openmp --output-on-failure

  kokkos-gpu:
    name: Kokkos GPU/CUDA (optional)
    runs-on: ${{ vars.KOKKOS_GPU_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect CUDA device
        id: cuda
        run: |
          if command -v nvidia-smi >/dev/null 2>&1 && \
             command -v nvcc >/dev/null 2>&1 && \
             nvidia-smi -L >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Kokkos CUDA validation will run on this runner." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No CUDA device and nvcc pair detected; skipping GPU Kokkos test."
            echo "Kokkos CUDA validation was skipped because this runner does not provide both a CUDA device and nvcc." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install build dependencies
        if: steps.cuda.outputs.available == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ git cmake

      - name: Build and install Kokkos CUDA
        if: steps.cuda.outputs.available == 'true'
        run: |
          git clone --branch "$KOKKOS_VERSION" --depth 1 \
            https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kokkos-build-cuda \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/kokkos-install-cuda \
            -DCMAKE_CXX_COMPILER=/tmp/kokkos/bin/nvcc_wrapper \
            -DKokkos_ENABLE_CUDA=ON \
            -DKokkos_ENABLE_CUDA_LAMBDA=ON \
            -DKokkos_ARCH_NATIVE=ON
          cmake --build /tmp/kokkos-build-cuda --target install --parallel 2

      - name: Configure cpp_oti_lib with Kokkos CUDA
        if: steps.cuda.outputs.available == 'true'
        run: |
          cmake -S . -B build-kokkos-cuda \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=/tmp/kokkos/bin/nvcc_wrapper \
            -DCMAKE_PREFIX_PATH=/tmp/kokkos-install-cuda \
            -DOTI_ENABLE_KOKKOS=ON \
            -DOTI_BUILD_PYTHON=OFF \
            -DOTI_BUILD_TESTS=OFF

      - name: Build Kokkos CUDA test
        if: steps.cuda.outputs.available == 'true'
        run: cmake --build build-kokkos-cuda --parallel 2

      - name: Run Kokkos CUDA test
        if: steps.cuda.outputs.available == 'true'
        run: ctest --test-dir build-kokkos-cuda --output-on-failure

  python:
    name: Python bindings
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run Python tests
        run: pytest tests/test_python_bindings.py

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake doxygen g++ git graphviz

      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Generate Doxygen XML
        run: doxygen docs/Doxyfile

      - name: Build Sphinx docs
        run: sphinx-build -E -a -W -b html docs docs/_build/html

      - name: Build scalar coverage data
        run: |
          BUILD_DIR=/tmp/otinum_coverage_tests \
          LOG_DIR=/tmp/otinum_coverage_logs \
          CXXFLAGS="-std=c++17 -O0 -g --coverage -Wall -Wextra -pedantic" \
          tests/run_unit_tests.sh

      - name: Build Kokkos OpenMP coverage data
        run: |
          git clone --branch "$KOKKOS_VERSION" --depth 1 \
            https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kokkos-build-openmp-coverage \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/kokkos-install-openmp-coverage \
            -DCMAKE_CXX_COMPILER=g++ \
            -DKokkos_ENABLE_OPENMP=ON \
            -DKokkos_ARCH_NATIVE=ON
          cmake --build /tmp/kokkos-build-openmp-coverage --target install --parallel 2
          cmake -S . -B build-kokkos-openmp-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=/tmp/kokkos-install-openmp-coverage \
            -DCMAKE_CXX_FLAGS="-O0 -g --coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DOTI_ENABLE_KOKKOS=ON \
            -DOTI_BUILD_PYTHON=OFF \
            -DOTI_BUILD_TESTS=OFF
          cmake --build build-kokkos-openmp-coverage --parallel 2
          ctest --test-dir build-kokkos-openmp-coverage --output-on-failure

      - name: Build coverage report into docs site
        run: |
          mkdir -p docs/_build/html/generated/coverage
          GCOV=${GCOV:-gcov}
          gcovr \
            --root . \
            --gcov-executable "$GCOV" \
            --filter include/otinum/ \
            --html-details docs/_build/html/generated/coverage/index.html \
            --xml docs/_build/html/generated/coverage/coverage.xml \
            /tmp/otinum_coverage_tests \
            build-kokkos-openmp-coverage

      # Pages deployment is opt-in through the DEPLOY_PAGES repository variable
      # because GitHub Pages is unavailable while the repository is private.
      # Set DEPLOY_PAGES=true after enabling Pages (Settings -> Pages, source
      # "GitHub Actions").
      - name: Upload Pages artifact
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/master' &&
          vars.DEPLOY_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy-docs:
    name: Deploy documentation
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/master' &&
      vars.DEPLOY_PAGES == 'true'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
